name: pyago
description: "Pyago — a platform for meaningful human expression."
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Design / Animation
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^7.2.0

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  video_player: ^2.9.1
  record: ^5.1.0
  audioplayers: ^6.0.0

  # Rich text / markdown
  flutter_markdown: ^0.7.3

  # Security
  local_auth: ^2.3.0

  # Real-time transport (used behind a Stream<Message> abstraction;
  # dev/mock flavor fakes it locally, see lib/core/network/realtime)
  web_socket_channel: ^2.4.0

  # Push notification hooks (foreground/background handling scaffolding;
  # inert in dev/mock flavor until Firebase project files are added)
  flutter_local_notifications: ^17.2.2

  # Model code generation (freezed + json_serializable)
  # Run: dart run build_runner build --delete-conflicting-outputs
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.5
  uuid: ^4.4.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # Lint
  custom_lint: ^0.7.3
  riverpod_lint: ^2.4.3

  # Testing
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

  # App icon + splash screen generation
  # Run after adding icon assets:
  #   dart run flutter_launcher_icons
  #   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  # Inter is loaded via google_fonts at runtime.
  # The local embedding below is the offline fallback — ensures correct
  # typography even without network access on first launch.
  # Download Inter from https://fonts.google.com/specimen/Inter and place
  # the TTF files in assets/fonts/ to activate this section.
  #
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #   - family: Merriweather
  #     fonts:
  #       - asset: assets/fonts/Merriweather-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Merriweather-Bold.ttf
  #         weight: 700

# ── flutter_launcher_icons configuration ─────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#5B4EF2"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: false

# ── flutter_native_splash configuration ──────────────────────────────────────
flutter_native_splash:
  color: "#5B4EF2"
  image: "assets/icons/app_icon.png"
  color_dark: "#0E0D12"
  image_dark: "assets/icons/app_icon.png"
  android: true
  ios: true
  android_12:
    image: "assets/icons/app_icon.png"
    color: "#5B4EF2"
    image_dark: "assets/icons/app_icon.png"
    color_dark: "#0E0D12"
  fullscreen: false
