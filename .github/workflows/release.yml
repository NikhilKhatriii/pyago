name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # triggers on v1.2.3, v0.2.0, etc.

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Release APK (Android) ─────────────────────────────────────────────────
  release_android:
    name: Release APK (Android)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: pubspec.yaml
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generator
        run: dart run build_runner build --delete-conflicting-outputs

      # Decode the keystore from the GitHub secret and write it to disk.
      # In your repo settings → Secrets, add:
      #   KEYSTORE_BASE64      — base64-encoded .jks file
      #   KEYSTORE_PASSWORD    — store password
      #   KEY_ALIAS            — key alias
      #   KEY_PASSWORD         — key password
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=PYAGO_FLAVOR=production \
            --obfuscate \
            --split-debug-info=build/debug-symbols

      - name: Build release AAB (Play Store)
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=PYAGO_FLAVOR=production \
            --obfuscate \
            --split-debug-info=build/debug-symbols

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pyago ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}   # e.g. v1.0.0-beta is a pre-release
