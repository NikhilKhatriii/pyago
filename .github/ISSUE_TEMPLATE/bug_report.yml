name: 🐛 Bug Report
description: Report a reproducible bug in Pyago
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Pyago version
      description: Found in `pubspec.yaml` (version field) or the About screen
      placeholder: "0.2.0+1"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: dropdown
    id: flavor
    attributes:
      label: Flavor / environment
      options:
        - dev (mock backend)
        - staging
        - production
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste the output of `flutter run --verbose` or the crash log here.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Device model, OS version, screenshots, screen recordings, etc.
