include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
    strict-inference: true

  errors:
    # Treat these as hard errors so CI fails on them
    missing_required_param: error
    missing_return: error
    dead_code: warning
    # riverpod_annotation generates targets that confuse this rule
    invalid_annotation_target: ignore

  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - ".dart_tool/**"

linter:
  rules:
    # --- Import hygiene ---
    always_use_package_imports: true
    directives_ordering: true

    # --- Safety ---
    avoid_dynamic_calls: true
    avoid_slow_async_io: true
    cancel_subscriptions: true
    close_sinks: true
    unawaited_futures: true
    avoid_void_async: true

    # --- Code style ---
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_fields: true
    prefer_final_locals: true
    prefer_single_quotes: true
    always_declare_return_types: true
    unnecessary_this: false     # disabled: overly pedantic with Riverpod patterns
    sort_child_properties_last: true
    avoid_print: true

    # --- Null safety ---
    prefer_null_aware_operators: true

    # --- Documentation ---
    public_member_api_docs: false   # not enforced yet; enable gradually

custom_lint:
  rules:
    # Riverpod-specific lint rules (from riverpod_lint)
    - avoid_public_notifier_properties
    - provider_dependencies
    - avoid_ref_inside_state_dispose
